  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      width: 100%;
      background: #111111;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }
    /* Splash screen while React loads */
    #splash {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.08em;
      font-family: 'Rajdhani', sans-serif;
    }
    #splash-logo .fc { color: #C8FF00; }
    #splash-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #C8FF00;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <!-- Splash screen -->
  <div id="splash">
    <div style="font-size:36px">&#x26BD;</div>
    <div id="splash-logo"><span class="fc">FC</span>ROSTER</div>
    <div id="splash-dot"></div>
  </div>

  <div id="root"></div>

  <script>
    // Hide splash once React root renders
    var observer = new MutationObserver(function() {
      var root = document.getElementById('root');
      if (root && root.children.length > 0) {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(function() { splash.remove(); }, 500);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>

  <!-- React bundle injected by build tool (Vite/CRA) -->
  <script type="module" src="/src/main.jsx"></script>
</body>
